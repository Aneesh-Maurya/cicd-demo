name: Express CI/CD Demo

on:
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: "18"

    - name: Install Dependencies
      run: npm install

    - name: Start Server
      run: node app.js &

    - name: Wait for Server
      run: sleep 5

    - name: Run API Test
      run: npm test